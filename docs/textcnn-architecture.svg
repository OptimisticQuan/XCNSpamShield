<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">XCNSpamShield TextCNN architecture</title>
  <desc id="desc">Current TextCNN used by XCNSpamShield. The model normalizes author name plus reply text into cleaned pinyin, builds a length-30 token sequence, applies an embedding layer, four Conv1D branches with kernel sizes 2 to 5, masked max plus mean pooling, concatenation, dropout, a linear layer, and sigmoid output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .label { font: 700 16px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 13px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .small { font: 600 12px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .box { rx: 20; ry: 20; filter: url(#shadow); }
      .link { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .branch { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="860" fill="url(#bg)"/>

  <text x="60" y="68" class="title">XCNSpamShield TextCNN</text>
  <text x="60" y="96" class="subtitle">Current browser-side classifier: seq=30, embedding=64, Conv1D kernels 2..5, 32 filters per branch</text>

  <rect class="box" x="70" y="145" width="180" height="82" fill="#dbeafe"/>
  <text x="160" y="178" text-anchor="middle" class="label">Reply Input</text>
  <text x="160" y="202" text-anchor="middle" class="text">visible reply text</text>
  <text x="160" y="220" text-anchor="middle" class="text">plus author handle</text>

  <rect class="box" x="295" y="145" width="220" height="82" fill="#fde68a"/>
  <text x="405" y="178" text-anchor="middle" class="label">Normalization</text>
  <text x="405" y="202" text-anchor="middle" class="text">author_name + original_text</text>
  <text x="405" y="220" text-anchor="middle" class="text">to cleaned_pinyin</text>

  <rect class="box" x="560" y="137" width="250" height="98" fill="#ddd6fe"/>
  <text x="685" y="173" text-anchor="middle" class="label">Token Sequence</text>
  <text x="685" y="198" text-anchor="middle" class="text">[CLS] + syllables + [SEP]</text>
  <text x="685" y="218" text-anchor="middle" class="text">padded / clipped to length 30</text>

  <rect class="box" x="855" y="145" width="190" height="82" fill="#bfdbfe"/>
  <text x="950" y="178" text-anchor="middle" class="label">Embedding</text>
  <text x="950" y="202" text-anchor="middle" class="text">vocab x 64</text>
  <text x="950" y="220" text-anchor="middle" class="text">padding index fixed</text>

  <path class="link" d="M250 186 H295"/>
  <path class="link" d="M515 186 H560"/>
  <path class="link" d="M810 186 H855"/>

  <rect class="box" x="80" y="300" width="220" height="74" fill="#bbf7d0"/>
  <text x="190" y="332" text-anchor="middle" class="label">Conv1D Branch 1</text>
  <text x="190" y="355" text-anchor="middle" class="text">kernel size = 2</text>

  <rect class="box" x="345" y="300" width="220" height="74" fill="#bbf7d0"/>
  <text x="455" y="332" text-anchor="middle" class="label">Conv1D Branch 2</text>
  <text x="455" y="355" text-anchor="middle" class="text">kernel size = 3</text>

  <rect class="box" x="610" y="300" width="220" height="74" fill="#bbf7d0"/>
  <text x="720" y="332" text-anchor="middle" class="label">Conv1D Branch 3</text>
  <text x="720" y="355" text-anchor="middle" class="text">kernel size = 4</text>

  <rect class="box" x="875" y="300" width="220" height="74" fill="#bbf7d0"/>
  <text x="985" y="332" text-anchor="middle" class="label">Conv1D Branch 4</text>
  <text x="985" y="355" text-anchor="middle" class="text">kernel size = 5</text>

  <path class="branch" d="M950 227 V260 H190 V300"/>
  <path class="branch" d="M950 227 V260 H455 V300"/>
  <path class="branch" d="M950 227 V260 H720 V300"/>
  <path class="branch" d="M950 227 V260 H985 V300"/>

  <rect class="box" x="80" y="435" width="220" height="86" fill="#fecaca"/>
  <text x="190" y="467" text-anchor="middle" class="label">ReLU + Pool</text>
  <text x="190" y="490" text-anchor="middle" class="text">masked max pooling</text>
  <text x="190" y="509" text-anchor="middle" class="text">plus masked mean pooling</text>

  <rect class="box" x="345" y="435" width="220" height="86" fill="#fecaca"/>
  <text x="455" y="467" text-anchor="middle" class="label">ReLU + Pool</text>
  <text x="455" y="490" text-anchor="middle" class="text">masked max pooling</text>
  <text x="455" y="509" text-anchor="middle" class="text">plus masked mean pooling</text>

  <rect class="box" x="610" y="435" width="220" height="86" fill="#fecaca"/>
  <text x="720" y="467" text-anchor="middle" class="label">ReLU + Pool</text>
  <text x="720" y="490" text-anchor="middle" class="text">masked max pooling</text>
  <text x="720" y="509" text-anchor="middle" class="text">plus masked mean pooling</text>

  <rect class="box" x="875" y="435" width="220" height="86" fill="#fecaca"/>
  <text x="985" y="467" text-anchor="middle" class="label">ReLU + Pool</text>
  <text x="985" y="490" text-anchor="middle" class="text">masked max pooling</text>
  <text x="985" y="509" text-anchor="middle" class="text">plus masked mean pooling</text>

  <path class="link" d="M190 374 V435"/>
  <path class="link" d="M455 374 V435"/>
  <path class="link" d="M720 374 V435"/>
  <path class="link" d="M985 374 V435"/>

  <rect class="box" x="380" y="585" width="420" height="88" fill="#c7d2fe"/>
  <text x="590" y="620" text-anchor="middle" class="label">Concatenate Branch Features</text>
  <text x="590" y="644" text-anchor="middle" class="text">4 branches x 32 filters = 128 features</text>

  <path class="branch" d="M190 521 V552 H590 V585"/>
  <path class="branch" d="M455 521 V552 H590 V585"/>
  <path class="branch" d="M720 521 V552 H590 V585"/>
  <path class="branch" d="M985 521 V552 H590 V585"/>

  <rect class="box" x="460" y="715" width="260" height="62" fill="#fde68a"/>
  <text x="590" y="751" text-anchor="middle" class="label">Dropout 0.2</text>

  <path class="link" d="M590 673 V715"/>

  <rect class="box" x="460" y="795" width="260" height="62" fill="#bfdbfe"/>
  <text x="590" y="828" text-anchor="middle" class="label">Linear 128 → 1 + Sigmoid</text>
  <text x="590" y="847" text-anchor="middle" class="small">output spam probability</text>

  <path class="link" d="M590 777 V795"/>

  <rect class="box" x="875" y="640" width="250" height="130" fill="#e2e8f0"/>
  <text x="1000" y="675" text-anchor="middle" class="label">Runtime Decision</text>
  <text x="1000" y="702" text-anchor="middle" class="text">default threshold = 0.5</text>
  <text x="1000" y="726" text-anchor="middle" class="text">Spam reply -> fold banner</text>
  <text x="1000" y="748" text-anchor="middle" class="text">3 spam replies -> auto queue block</text>
  <text x="1000" y="770" text-anchor="middle" class="text">icon click -> manual queue block</text>

  <path class="link" d="M720 826 H835 Q855 826 855 806 V705 H875"/>
</svg>
